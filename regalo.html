<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Experiencia Body Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #render-area { width: 800px; background: white; padding: 40px; box-sizing: border-box; }
        .mensaje-bloque { text-align: center; margin-bottom: 40px; padding: 20px; border-bottom: 1px solid #eee; }
        .mensaje-bloque h2 { color: #c5a059; font-style: italic; font-size: 28px; }
        .mensaje-bloque p { font-size: 18px; color: #444; line-height: 1.6; }
        .gift-card-final { width: 700px; height: 467px; margin: 0 auto; position: relative; background-size: cover; }
        .dato-input { position: absolute; font-size: 16px; color: #555; font-weight: 600; left: 130px; }
        #val-para { top: 365px; }
        #val-de { top: 396px; }
        #val-servicio { top: 428px; }
        .btn-descarga { margin-top: 20px; background: #2c2c2c; color: white; padding: 15px 40px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="render-area" style="display:none;">
        <div class="mensaje-bloque">
            <h2>Una dedicatoria especial</h2>
            <p id="txt-mensaje"></p>
        </div>
        <div id="card-img" class="gift-card-final">
            <div id="val-para" class="dato-input"></div>
            <div id="val-de" class="dato-input"></div>
            <div id="val-servicio" class="dato-input"></div>
        </div>
    </div>
    <button id="download-btn" class="btn-descarga" style="display:none;">DESCARGAR PDF</button>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        if (paymentId) {
            fetch(`https://body-elite-giftcards.onrender.com/api/pago/${paymentId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.status === 'approved') {
                        const m = data.metadata;
                        const card = document.getElementById('card-img');
                        card.style.backgroundImage = `url('${m.rol === 'Hija' ? 'giftcard-hija.jpg' : 'giftcard-hijo.jpg'}')`;
                        document.getElementById('txt-mensaje').innerText = m.mensaje;
                        document.getElementById('val-para').innerText = m.para;
                        document.getElementById('val-de').innerText = m.de;
                        document.getElementById('val-servicio').innerText = m.servicio.toUpperCase();
                        document.getElementById('render-area').style.display = 'block';
                        document.getElementById('download-btn').style.display = 'block';
                    }
                });
        }
        document.getElementById('download-btn').addEventListener('click', () => {
            html2canvas(document.getElementById('render-area'), { scale: 2 }).then(canvas => {
                const img = canvas.toDataURL('image/jpeg', 0.95);
                const pdf = new jspdf.jsPDF('p', 'px', [800, 1000]);
                pdf.addImage(img, 'JPEG', 0, 0, 800, 1000);
                pdf.save('GiftCard-BodyElite.pdf');
            });
        });
    </script>
</body>
</html>
